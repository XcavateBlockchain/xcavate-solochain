name: Release

# Docker images are published by the `docker.yml` workflow (on every push to
# main and on `v*` tags). This workflow only attaches the release binaries.

permissions:
  contents: write

on:
  release:
    types: [released]

jobs:
  release-binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Rust compilation prerequisites
        run: |
          sudo apt update
          sudo apt install -y \
            protobuf-compiler
          rustup target add wasm32-unknown-unknown
          rustup component add rust-src

      - name: Build the node
        run: cargo build --locked --release
        timeout-minutes: 90

      - name: Upload the binaries
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            target/release/xcavate-node
            target/release/wbuild/xcavate-runtime/xcavate_runtime.compact.compressed.wasm
