name: Docker

# Build and publish the xcavate-node image to the GitHub Container Registry.
# - push to `main`        -> tags `latest` + `sha-<short>`
# - push of a `v*` tag    -> semver tags (e.g. `1.2.3`, `1.2`) + `latest`
# - manual run            -> `sha-<short>`
#
# Pull with:  docker pull ghcr.io/xcavateblockchain/xcavate-solochain:latest
# Run with:   docker run ghcr.io/.../xcavate-solochain:latest --chain xcavate-testnet --validator ...

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Building polkadot-sdk needs a lot of disk; reclaim some on the runner.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # 1.3.1
        with:
          android: true
          dotnet: false
          haskell: false
          large-packages: false
          swap-storage: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          # Don't attach provenance/SBOM attestations: they add an
          # `unknown/unknown` entry to the image index that some deployment
          # platforms (and older container runtimes) fail to pull. Plain
          # `docker pull` tolerates it; stricter platforms do not.
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
